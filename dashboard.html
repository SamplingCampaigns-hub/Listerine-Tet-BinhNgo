<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dữ liệu Campaign Listerine 2026 - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; }
        .header-text { color: #2d1b5a; font-weight: 800; font-style: italic; text-transform: uppercase; }
        .badge-purple { background-color: #f3e8ff; color: #7e22ce; border-radius: 8px; font-weight: 700; font-size: 11px; padding: 4px 10px; text-transform: uppercase; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #9333ea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #login-screen { position: fixed; inset: 0; background-color: #020617; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; transition: opacity 0.5s; }
        .login-card { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; width: 100%; max-width: 400px; padding: 40px; text-align: center; }
        .hidden { display: none !important; }
        
        /* Input styling for password */
        #password-input {
            -webkit-text-security: disc; /* Bảo mật hơn cho input type text để tránh auto-fill sai */
        }
    </style>
</head>
<body class="p-6 md:p-10">

    <!-- MÀN HÌNH NHẬP PASSWORD -->
    <div id="login-screen">
        <div class="login-card shadow-2xl">
            <div class="w-16 h-16 bg-sky-500 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg shadow-sky-500/20">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-xl font-black text-white uppercase italic tracking-tighter mb-2">VINSTAR <span class="text-sky-400">DỮ LIỆU</span></h2>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-8">Hệ thống bảo mật 2026</p>
            
            <form id="login-form" class="space-y-4">
                <!-- Thêm autocomplete="off" và spellcheck="false" để tránh lỗi gõ tiếng Việt -->
                <input type="text" id="password-input" autocomplete="off" spellcheck="false" placeholder="Nhập mật khẩu..." class="w-full bg-slate-800 border border-white/5 p-4 rounded-2xl text-white outline-none focus:border-sky-500 text-center font-bold">
                <button type="submit" id="btn-login" class="w-full bg-sky-500 hover:bg-sky-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl transition-all">TRUY CẬP NGAY</button>
            </form>
            <p id="error-msg" class="text-red-400 text-[10px] font-bold mt-4 uppercase hidden">Mật khẩu chưa đúng, chị kiểm tra Unikey nhé!</p>
        </div>
    </div>

    <!-- NỘI DUNG CHÍNH (ẨN MẶC ĐỊNH) -->
    <div id="main-content" class="hidden">
        <div class="max-w-7xl mx-auto">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-2xl header-text">DỮ LIỆU CAMPAIGN</h1>
                    <div class="mt-2 flex items-center gap-2">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-200 px-2 py-1 rounded">TỔNG CỘNG:</span>
                        <span id="counter" class="text-sm font-extrabold text-red-500">Đang tải...</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.location.href='./index.html'" class="px-6 py-2 rounded-xl text-xs font-bold border border-slate-300 uppercase">Đóng</button>
                    <button id="btn-export" class="px-6 py-2 rounded-xl text-xs font-bold bg-emerald-500 text-white shadow-lg uppercase">Xuất Excel</button>
                </div>
            </header>

            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <th class="px-8 py-5">Thời gian</th>
                                <th class="px-8 py-5">SĐT</th>
                                <th class="px-8 py-5">Email</th>
                                <th class="px-8 py-5 text-center">Tuổi</th>
                                <th class="px-8 py-5">Trạm</th>
                                <th class="px-8 py-5 text-right">Mã quà</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body" class="text-sm font-bold text-slate-600">
                            <tr id="loading-row">
                                <td colspan="6" class="p-20 text-center">
                                    <div class="flex flex-col items-center justify-center gap-4">
                                        <div class="loading-spinner"></div>
                                        <span id="loading-text" class="text-slate-400 uppercase tracking-widest text-[10px]">Đang nạp toàn bộ 5440+ dữ liệu thực tế...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MẬT KHẨU: vinstar2026
        const SECURE_KEY = "vinstar2026"; 

        const loginForm = document.getElementById('login-form');
        const loginScreen = document.getElementById('login-screen');
        const mainContent = document.getElementById('main-content');
        const errorMsg = document.getElementById('error-msg');

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            // Lấy giá trị và xóa khoảng trắng ở 2 đầu (.trim())
            const input = document.getElementById('password-input').value.trim();
            
            if (input.toLowerCase() === SECURE_KEY) {
                loginScreen.style.opacity = '0';
                setTimeout(() => {
                    loginScreen.classList.add('hidden');
                    mainContent.classList.remove('hidden');
                    initFirebase();
                }, 400);
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('password-input').value = "";
            }
        };

        function initFirebase() {
            const firebaseConfig = {
                apiKey: "AIzaSyBmoGlurl-6yYPMa32Vop0N57P8DmXYOcw",
                authDomain: "listerine-tet2026.firebaseapp.com",
                projectId: "listerine-tet2026",
                storageBucket: "listerine-tet2026.firebasestorage.app",
                messagingSenderId: "76253494252",
                appId: "1:76253494252:web:54e219e2de091fa779dec9"
            };

            const appId = 'listerine-100ml-campaign';

            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            const db = firebase.firestore();
            const auth = firebase.auth();

            auth.signInAnonymously().then(() => {
                const colRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations');
                
                colRef.onSnapshot((snapshot) => {
                    let allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // Sắp xếp dữ liệu trong JS để không bị lỗi 404/Empty do thiếu Index
                    allData.sort((a, b) => {
                        const timeA = a.timestamp?.seconds || 0;
                        const timeB = b.timestamp?.seconds || 0;
                        return timeB - timeA;
                    });

                    renderTable(allData);
                }, (err) => {
                    console.error("Lỗi:", err);
                    document.getElementById('loading-text').innerText = "Lỗi kết nối. Chị kiểm tra lại cấu hình nhé!";
                });
            });
        }

        function renderTable(data) {
            const body = document.getElementById('data-table-body');
            const counter = document.getElementById('counter');
            
            counter.innerText = data.length.toLocaleString() + " / 6.000 CHAI";
            body.innerHTML = '';

            data.forEach(item => {
                const dateStr = item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleString('vi-VN') : '---';

                body.innerHTML += `
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition-all">
                        <td class="px-8 py-4 text-slate-400 font-mono text-[11px]">${dateStr}</td>
                        <td class="px-8 py-4 text-slate-800">${item.phone || 'N/A'}</td>
                        <td class="px-8 py-4 text-slate-500 text-xs">${item.email || 'N/A'}</td>
                        <td class="px-8 py-4 text-center text-slate-400">${item.age || 'N/A'}</td>
                        <td class="px-8 py-4 uppercase text-purple-600 text-xs">${item.store || item.station || 'Trạm chính'}</td>
                        <td class="px-8 py-4 text-right"><span class="badge-purple font-mono tracking-widest">${item.code || '---'}</span></td>
                    </tr>
                `;
            });
        }

        document.getElementById('btn-export').onclick = () => {
            let csv = "\uFEFFThời gian,SĐT,Email,Tuổi,Trạm,Mã quà\n";
            document.querySelectorAll("tbody tr").forEach(row => {
                const cols = row.querySelectorAll("td");
                if (cols.length > 0) {
                    csv += Array.from(cols).map(c => `"${c.innerText}"`).join(",") + "\n";
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Listerine_Full_Data_Export.csv`;
            link.click();
        };
    </script>
</body>
</html>
