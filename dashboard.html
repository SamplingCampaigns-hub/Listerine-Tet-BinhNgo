<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dữ liệu Campaign Listerine 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; }
        .purple-btn { background-color: #9333ea; color: white; transition: all 0.2s; }
        .purple-btn:hover { background-color: #7e22ce; }
        .green-btn { background-color: #10b981; color: white; }
        .header-text { color: #2d1b5a; font-weight: 800; font-style: italic; text-transform: uppercase; }
        .table-head { color: #94a3b8; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 2px solid #f1f5f9; }
        .data-row { border-bottom: 1px solid #f1f5f9; }
        .data-row:hover { background-color: #fcfaff; }
        .badge-purple { background-color: #f3e8ff; color: #7e22ce; border-radius: 8px; font-weight: 700; font-size: 11px; padding: 4px 10px; text-transform: uppercase; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #9333ea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl header-text">DỮ LIỆU CAMPAIGN</h1>
                <div class="mt-2 flex items-center gap-2">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-200 px-2 py-1 rounded">TỔNG CỘNG:</span>
                    <span id="counter" class="text-sm font-extrabold text-red-500">Đang tải...</span>
                    <span class="text-xs font-bold text-slate-400">/ 6.000 CHAI</span>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="window.location.href='./index.html'" class="px-6 py-2 rounded-xl text-xs font-bold border border-slate-300 hover:bg-slate-50 uppercase">Đóng</button>
                <button id="btn-export" class="px-6 py-2 rounded-xl text-xs font-bold green-btn shadow-lg uppercase">Xuất Excel</button>
                <button onclick="window.open('https://samplingcampaigns-hub.github.io/Listerine-Tet-BinhNgo/qr-list', '_blank')" class="px-6 py-2 rounded-xl text-xs font-bold purple-btn shadow-lg uppercase">Lấy QR</button>
            </div>
        </header>

        <!-- Data Table Card -->
        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="table-head bg-slate-50/50">
                            <th class="px-8 py-5">Thời gian</th>
                            <th class="px-8 py-5">SĐT</th>
                            <th class="px-8 py-5">Email</th>
                            <th class="px-8 py-5 text-center">Tuổi</th>
                            <th class="px-8 py-5">Trạm</th>
                            <th class="px-8 py-5 text-right">Mã quà</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="text-sm font-bold text-slate-600">
                        <!-- Loading placeholder -->
                        <tr id="loading-row">
                            <td colspan="6" class="p-20 text-center">
                                <div class="flex flex-col items-center justify-center gap-4">
                                    <div class="loading-spinner"></div>
                                    <span class="text-slate-400 uppercase tracking-widest text-[10px]">Đang kết nối kho dữ liệu thực tế...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // BỘ MÃ KẾT NỐI DATA CỦA CHỊ HỒNG
        const firebaseConfig = {
            apiKey: "AIzaSyBmoGlurl-6yYPMa32Vop0N57P8DmXYOcw",
            authDomain: "listerine-tet2026.firebaseapp.com",
            projectId: "listerine-tet2026",
            storageBucket: "listerine-tet2026.firebasestorage.app",
            messagingSenderId: "76253494252",
            appId: "1:76253494252:web:54e219e2de091fa779dec9"
        };

        const appId = 'listerine-100ml-campaign';

        // Initialize
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let allData = [];

        // Auth and Listen
        auth.signInAnonymously().then(() => {
            const colRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations');
            
            // Listen for Real-time updates
            colRef.orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
                allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTable(allData);
            }, (err) => {
                console.error("Lỗi:", err);
                document.getElementById('data-table-body').innerHTML = `<tr><td colspan="6" class="p-10 text-center text-red-400">Không có quyền truy cập dữ liệu. Chị kiểm tra cấu hình Firebase nhé!</td></tr>`;
            });
        });

        function renderTable(data) {
            const body = document.getElementById('data-table-body');
            const counter = document.getElementById('counter');
            
            if (data.length === 0) {
                body.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-slate-300 italic">Chưa có dữ liệu đăng ký.</td></tr>`;
                counter.innerText = "0";
                return;
            }

            counter.innerText = data.length.toLocaleString();
            body.innerHTML = '';

            data.forEach(item => {
                const dateStr = item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleString('vi-VN', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric'
                }) : 'Đang xử lý...';

                body.innerHTML += `
                    <tr class="data-row">
                        <td class="px-8 py-5 text-slate-400 font-medium font-mono text-[12px]">${dateStr}</td>
                        <td class="px-8 py-5 text-slate-800">${item.phone || 'N/A'}</td>
                        <td class="px-8 py-5 text-slate-500 font-medium lowercase text-xs">${item.email || 'N/A'}</td>
                        <td class="px-8 py-5 text-center text-slate-400">${item.age || 'N/A'}</td>
                        <td class="px-8 py-5 uppercase text-purple-600 text-xs tracking-tighter">${item.store || 'Khách vãng lai'}</td>
                        <td class="px-8 py-5 text-right"><span class="badge-purple font-mono tracking-widest">${item.code || '---'}</span></td>
                    </tr>
                `;
            });
        }

        // Export Excel Simple Logic
        document.getElementById('btn-export').onclick = () => {
            if (allData.length === 0) return;
            let csv = "\uFEFFThời gian,SĐT,Email,Tuổi,Trạm,Mã quà\n";
            allData.forEach(row => {
                const date = row.timestamp ? new Date(row.timestamp.seconds * 1000).toLocaleString('vi-VN') : '';
                csv += `"${date}","${row.phone}","${row.email}","${row.age}","${row.store}","${row.code}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "Listerine_Campaign_Data_Realtime.csv");
            link.click();
        };
    </script>
</body>
</html>
